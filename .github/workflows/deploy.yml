name: Java CI/CD with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Java 21 환경 세팅
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Gradle 문법 체크 (도커 내부 컴파일의 무결성 사전 검증)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Verify Compile Stability
        run: ./gradlew compileJava

      # 4. Docker Hub 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Docker 이미지 빌드 및 Docker Hub로 Push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/klljs-app:latest

      # 레포지토리의 배포용 컴포즈 파일을 운영 서버로 자동 전송
      - name: Copy docker-compose.prod.yml to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml" # 프로젝트 루트에 있는 파일 선택
          target: "/home/${{ secrets.SERVER_USER }}/apps" # 서버의 목적지 폴더

      # 6. 운영 서버(EC2)에 SSH로 접속하여 도커 컴포즈 실행 유도
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.SERVER_USER }}/apps
            
            # 💡 GitHub Secrets 환경 변수 주입 레이어 추가
            export POSTGRES_DB="${{ secrets.DB_NAME }}"
            export POSTGRES_USER="${{ secrets.DB_USER }}"
            export POSTGRES_PASSWORD="${{ secrets.DB_PASSWORD }}"
            
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml pull spring-app
            docker compose -f docker-compose.prod.yml up -d