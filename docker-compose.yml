services:
  # 1. PostgreSQL 데이터베이스 서비스 설정
  postgres-db:
    image: postgres:16-alpine
    container_name: klljs-postgres
    environment:
      POSTGRES_DB: klljs_db          # 생성할 DB 이름
      POSTGRES_USER: leejunheon       # DB 접속 계정명
      POSTGRES_PASSWORD: password123! # DB 접속 비밀번호
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # 컨테이너가 내려가도 데이터가 유실되지 않도록 볼륨 매핑
    networks:
      - klljs-network
    healthcheck: # DB가 완전히 준비되었는지 검사하는 로직
      test: ["CMD-SHELL", "pg_isready -U leejunheon -d klljs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Spring Boot 애플리케이션 서비스 설정
  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: klljs-app
    ports:
      - "8080:8080"
    environment:
      # 컨테이너 환경에서 DB 호스트명은 localhost가 아니라 서비스명인 'postgres-db'로 매핑됩니다.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/klljs_db
      SPRING_DATASOURCE_USERNAME: leejunheon
      SPRING_DATASOURCE_PASSWORD: password123!
    depends_on:
      postgres-db:
        condition: service_healthy # DB 헬스체크가 정상 통과(UP)된 후 WAS가 뜨도록 제어
    networks:
      - klljs-network

# 도커 컴포즈가 공유할 볼륨 및 가상 네트워크 정의
volumes:
  postgres_data:

networks:
  klljs-network:
    driver: bridge